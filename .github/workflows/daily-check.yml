name: Daily TraiNex Check

on:
  schedule:
    # Run daily at 06:00 UTC (= 07:00 Berlin winter / 08:00 summer)
    - cron: '0 6 * * *'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write    # needed to commit updated data files
  issues: write      # needed to create/comment on the tracking issue

jobs:
  check:
    name: Check TraiNex Schedule
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run schedule check
        env:
          TRAINEX_USER:        ${{ secrets.TRAINEX_USER }}
          TRAINEX_PASS:        ${{ secrets.TRAINEX_PASS }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
          # Optional SMTP email (leave empty to use GitHub Issues only)
          SMTP_HOST:           ${{ secrets.SMTP_HOST }}
          SMTP_PORT:           ${{ secrets.SMTP_PORT }}
          SMTP_USER:           ${{ secrets.SMTP_USER }}
          SMTP_PASS:           ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL:        ${{ secrets.NOTIFY_EMAIL }}
        run: npm run check

      - name: Commit updated schedule data
        run: |
          git config user.name  "trainex-sync[bot]"
          git config user.email "trainex-sync[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update schedule snapshot $(date -u '+%Y-%m-%d')"
            git push
          fi
