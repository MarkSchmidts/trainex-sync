name: Daily TraiNex Check

on:
  # Manual trigger from GitHub UI (useful for testing)
  workflow_dispatch:
  # Disabled schedule — the VPS Docker container handles daily scraping instead.
  # Uncomment below if you switch to a self-hosted runner instead of VPS Docker.
  # schedule:
  #   - cron: '0 6 * * *'

permissions:
  contents: write
  issues: write

jobs:
  check:
    name: Check TraiNex Schedule
    # Runs on your VPS self-hosted runner.
    # Setup: https://github.com/MarkSchmidts/trainex-sync/settings/actions/runners
    # Note: this job is only used for manual "trigger from GitHub UI" runs.
    #       The daily automatic check is handled by Docker on the VPS (src/daemon.js).
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm test

      - name: Run schedule check
        env:
          TRAINEX_USER:      ${{ secrets.TRAINEX_USER }}
          TRAINEX_PASS:      ${{ secrets.TRAINEX_PASS }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NOTIFY_EMAIL:      ${{ secrets.NOTIFY_EMAIL }}
        run: npm run check

      - name: Commit updated schedule data
        run: |
          git config user.name  "trainex-sync[bot]"
          git config user.email "trainex-sync[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: update schedule snapshot $(date -u '+%Y-%m-%d')"
            git push
          fi
